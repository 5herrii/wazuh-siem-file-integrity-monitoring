<!--
This configuration enables File Integrity Monitoring (FIM)
on a specific Windows directory using Wazuh Syscheck.

It detects:
- File creation
- File deletion
- File modification
in real time.
-->

<!-- File Integrity Monitoring Configuration -->

<syscheck>
  <!-- Enable real-time monitoring -->
  <directories realtime="yes">   PATH-OF-FILE-YOU-WANT-TO-MONITOR   </directories>

  <!-- Ignore common file types -->
  <ignore type="sregex">.log$|.tmp$|.jpg$|.png$|.chm$|.pnf$|.evtx$</ignore>
</syscheck>
